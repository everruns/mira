# Mira host configuration. Picked up by the `mira` CLI from the nearest
# directory walking up from the working directory. All sections are optional.

# Launcher used when neither a launch flag nor `--launcher` picks one — so a
# bare `mira run` works. Top-level, so it must sit above the first [section]:
# below one, TOML nests it inside that section and it is silently ignored
# (`mira doctor` flags exactly that).
default_launcher = "greet"

[results]
# Where `mira run --save` / `mira score --save` archive runs. Each run lands in
# `<dir>/<run_id>/` (report.json, report.html, meta.json). Defaults to ./results.
dir = "./results"

[environment]
# Record the run's environment (git commit/branch/dirty, OS/arch/host/CPU/memory,
# mira version, CI labels) into meta.json. On by default and best-effort.
enabled = true

# Static labels stamped on every saved run, for later filtering/grouping.
# Override auto-detected CI labels on key collision.
# [environment.labels]
# team = "search"
# region = "us-east-1"

# Named launchers, selected with `mira --launcher NAME`. A launcher is a saved
# way to start the study process (script / bin / example / cmd, plus package /
# manifest), so a repo's invocation lives here instead of being retyped on every
# call. Explicit launch flags override the named fields; `default_launcher` (top
# of this file) is used when neither a flag nor `--launcher` picks one.
[launchers.greet]
# The bundled single-file example study (mira --script examples/greet.rs).
script = "examples/greet.rs"

# A polyglot (non-Rust) study:
# [launchers.py]
# python3 = "study.py"   # or uv = "…" / python = "…" / cmd = "<command line>"

# Named selection presets, applied with `mira run --preset NAME`. A preset is a
# saved bundle of selection criteria (targets / samples / evals / axes / tag); it
# only *subsets* the grid the study declared. Explicit flags override the preset.
# `targets`/`samples`/`evals` glob-match (`*`, `?`, `[set]`, `{a,b}`; a literal is
# exact) and take a single string or a list.
[presets.smoke]
# Fast offline pass: only the sim target, only the "low" effort axis value.
targets = "sim"
axes = { effort = ["low"] }
# Optional preset default: give up on any case after 120s (lowest-priority
# timeout source — `--timeout` and [targets.LABEL].timeout override it).
# timeout = 120

# Per-target host settings, keyed by target label. `timeout` (seconds) is the
# wall-clock budget for one case against that target: when exceeded, the host
# cancels the in-flight run and records the case failed. `mira run --timeout`
# overrides this; it in turn overrides a preset's timeout.
# [targets."anthropic/claude-opus-4-8"]
# timeout = 300
