# Mira host configuration. Picked up by the `mira` CLI from the nearest
# directory walking up from the working directory. All sections are optional.

[results]
# Where `mira run --save` / `mira score --save` archive runs. Each run lands in
# `<dir>/<run_id>/` (report.json, report.html, meta.json). Defaults to ./results.
dir = "./results"

[environment]
# Record the run's environment (git commit/branch/dirty, OS/arch/host/CPU/memory,
# mira version, CI labels) into meta.json. On by default and best-effort.
enabled = true

# Static labels stamped on every saved run, for later filtering/grouping.
# Override auto-detected CI labels on key collision.
# [environment.labels]
# team = "search"
# region = "us-east-1"

# Named launchers, selected with `mira --launcher NAME`. A launcher is a saved
# way to start the study process (bin / example / cmd, plus package / manifest),
# so a repo's invocation lives here instead of being retyped on every call.
# Explicit launch flags override the named fields. `default_launcher` is used
# when neither a flag nor `--launcher` picks one — so a bare `mira run` works.
default_launcher = "greet"

[launchers.greet]
# The bundled example study (cargo run -q --bin greet).
bin = "greet"

# A polyglot (non-Rust) study:
# [launchers.py]
# python3 = "study.py"   # or uv = "…" / python = "…" / cmd = "<command line>"

# Named selection presets, applied with `mira run --preset NAME`. A preset is a
# saved bundle of selection criteria (targets / axes / tag / filter / evals); it
# only *subsets* the grid the study declared. Explicit flags override the preset.
[presets.smoke]
# Fast offline pass: only the sim target, only the "low" effort axis value.
targets = ["sim"]
axes = { effort = ["low"] }
