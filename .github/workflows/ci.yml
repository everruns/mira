name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy (deny warnings)
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Build documentation
        run: cargo doc --no-deps --all-features
        env:
          RUSTDOCFLAGS: "-D warnings"

  audit:
    name: Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: License & source check (cargo-deny)
        uses: EmbarkStudios/cargo-deny-action@bb137d7af7e4fb67e5f82a49c4fce4fad40782fe # v2
        with:
          command: check licenses sources bans

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      # Fast core tests first so failures surface before the heavy everruns
      # adapter (which pulls the full runtime dependency tree) compiles.
      - name: Test core crates
        run: cargo test -p mira-eval -p mira-cli

      - name: Test whole workspace (incl. mira-everruns)
        run: cargo test --workspace

      - name: Doc tests
        run: cargo test --workspace --doc

  examples:
    name: Examples
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      # Drive each bundled example study through the host CLI end-to-end. These
      # run fully offline against the `sim` model — no API keys, must stay green.
      # This is also the host↔study protocol's end-to-end coverage.
      - name: Run example evals via the host CLI
        run: |
          for ex in greet coding cli_subject metrics matrix swe_bench llmsim; do
            echo "=== $ex ==="
            cargo run -q -p mira-cli -- --bin "$ex" run
          done

      - name: Run the polyglot (Python) eval study via the host CLI
        run: |
          cargo run -q -p mira-cli -- --cmd "python3 examples/greet-python/study.py" run

      - name: Render an HTML report (smoke)
        run: |
          cargo run -q -p mira-cli -- --bin metrics run --format html --out report.html
          test -s report.html && grep -q "Mira eval report" report.html

  # Gate job for branch protection — name must stay "Check".
  check:
    name: Check
    if: always()
    needs: [lint, audit, test, examples]
    runs-on: ubuntu-latest
    steps:
      - name: Verify all jobs passed
        run: |
          if [[ "${{ needs.lint.result }}" != "success" ]] || \
             [[ "${{ needs.audit.result }}" != "success" ]] || \
             [[ "${{ needs.test.result }}" != "success" ]] || \
             [[ "${{ needs.examples.result }}" != "success" ]]; then
            echo "One or more required jobs failed"
            exit 1
          fi
