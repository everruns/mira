name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy (deny warnings)
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Build documentation
        run: cargo doc --no-deps --all-features
        env:
          RUSTDOCFLAGS: "-D warnings"

  audit:
    name: Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: License & source check (cargo-deny)
        uses: EmbarkStudios/cargo-deny-action@bb137d7af7e4fb67e5f82a49c4fce4fad40782fe # v2
        with:
          command: check licenses sources bans

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      # The committed JSON Schema under schema/ is generated from the protocol
      # types; fail if a protocol change landed without regenerating it. The
      # validation suite (mira-schema-gen) runs under `cargo test --workspace`.
      - name: Protocol schema is up to date
        run: cargo run -q -p mira-schema-gen -- --check

      # Experimental protocol fields are staged behind `protocol-unstable`;
      # build/test that path so staged additions can't rot.
      - name: Test staged (unstable) protocol
        run: cargo test -p mira-eval --features protocol-unstable

      # Fast core tests first so failures surface before the heavy everruns
      # adapter (which pulls the full runtime dependency tree) compiles.
      - name: Test core crates
        run: cargo test -p mira-eval -p mira-cli

      - name: Test whole workspace (incl. mira-everruns)
        run: cargo test --workspace

      - name: Doc tests
        run: cargo test --workspace --doc

  examples:
    name: Examples
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      # Drive each bundled example study through the host CLI end-to-end. These
      # run fully offline against the `sim` model — no API keys, must stay green.
      # This is also the host↔study protocol's end-to-end coverage.
      - name: Run example evals via the host CLI
        run: |
          for ex in greet coding cli_subject metrics matrix swe_bench llmsim llm_judge; do
            echo "=== $ex ==="
            cargo run -q -p mira-cli -- --bin "$ex" run
          done

      - name: Run the polyglot (Python) eval study via the host CLI
        run: |
          cargo run -q -p mira-cli -- --cmd "python3 examples/greet-python/study.py" run

      - name: Render an HTML report (smoke)
        run: |
          cargo run -q -p mira-cli -- --bin metrics run --format html --out report.html
          test -s report.html && grep -q "Mira eval report" report.html

  sdks:
    name: SDKs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # The Python SDK's wire types are generated from schema/v1/; fail if a
      # protocol change landed without regenerating them (the Python dual of the
      # Rust `--check` drift guard). Then run the schema-conformance + serve-loop
      # tests against the committed schema.
      - name: Python SDK is in sync with the schema
        run: python3 sdks/python/codegen.py --check

      - name: Python SDK tests
        run: |
          python3 -m pip install --quiet jsonschema pytest
          cd sdks/python && python3 -m pytest -q

  # Live LLM-as-judge integration tests (mira-judge). These hit real provider
  # APIs and cost money, so they run only on pushes to main and manual dispatch —
  # never on PRs (fork safety + spend) — and are NOT part of the "Check" gate, so
  # an external hiccup never blocks a merge. Keys come from Doppler.
  llm-integration:
    name: LLM integration (mira-judge)
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      # Fetch provider keys from Doppler and run the #[ignore]d judge tests.
      # Each test no-ops (the cell is N/A) if its key is absent, so a missing
      # secret degrades gracefully rather than failing the job.
      - name: Run provider judge tests
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        run: |
          # Tolerant fetch: a missing secret, bad token, or error payload makes
          # python exit non-zero (empty stdout), so `|| true` yields an empty
          # string and the test then no-ops as N/A instead of failing the job.
          fetch() {
            curl -s "https://api.doppler.com/v3/configs/config/secret?name=$1" \
              -u "$DOPPLER_TOKEN:" 2>/dev/null \
              | python3 -c "import sys,json;print(json.load(sys.stdin)['value']['raw'])" 2>/dev/null \
              || true
          }
          export OPENAI_API_KEY="$(fetch OPENAI_API_KEY)"
          export ANTHROPIC_API_KEY="$(fetch ANTHROPIC_API_KEY)"
          cargo test -p mira-judge -- --ignored --nocapture

  # Gate job for branch protection — name must stay "Check".
  check:
    name: Check
    if: always()
    needs: [lint, audit, test, examples, sdks]
    runs-on: ubuntu-latest
    steps:
      - name: Verify all jobs passed
        run: |
          if [[ "${{ needs.lint.result }}" != "success" ]] || \
             [[ "${{ needs.audit.result }}" != "success" ]] || \
             [[ "${{ needs.test.result }}" != "success" ]] || \
             [[ "${{ needs.examples.result }}" != "success" ]] || \
             [[ "${{ needs.sdks.result }}" != "success" ]]; then
            echo "One or more required jobs failed"
            exit 1
          fi
