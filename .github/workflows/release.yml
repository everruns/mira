name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    # Run on manual dispatch, or when a release-prep commit lands on main.
    if: "${{ github.event_name == 'workflow_dispatch' || startsWith(github.event.head_commit.message, 'chore(release): prepare v') }}"
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - name: Extract version
        id: version
        env:
          EVENT_NAME: ${{ github.event_name }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          GITHUB_REF: ${{ github.ref }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            if [ "$GITHUB_REF" != "refs/heads/main" ]; then
              echo "Error: manual releases must be dispatched from refs/heads/main"
              exit 1
            fi
            VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          else
            FIRST_LINE=$(echo "$COMMIT_MSG" | head -1)
            VERSION=$(echo "$FIRST_LINE" | sed -n 's/.*prepare v\([0-9]*\.[0-9]*\.[0-9]*\).*/\1/p')
          fi
          if [ -z "$VERSION" ]; then
            echo "Error: could not determine version"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected version: $VERSION"

      - name: Verify version matches Cargo.toml
        run: |
          CARGO_VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          if [ "${{ steps.version.outputs.version }}" != "$CARGO_VERSION" ]; then
            echo "Error: commit version (${{ steps.version.outputs.version }}) != Cargo.toml ($CARGO_VERSION)"
            exit 1
          fi
          echo "Version verified: $CARGO_VERSION"

      - name: Verify release source is on main
        run: |
          git fetch --force origin main:refs/remotes/origin/main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "Error: release source $GITHUB_SHA is not reachable from origin/main"
            exit 1
          fi

      - name: Extract release notes from CHANGELOG
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          awk "/^## \[$VERSION\]/{found=1; next} /^## \[/{if(found) exit} found{print}" CHANGELOG.md > release_notes.md
          echo "Release notes extracted for v$VERSION"

      - name: Create and verify release tag
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          REMOTE_TAG_SHA=$(git ls-remote origin "refs/tags/$TAG" | awk '{print $1}')
          if [ -n "$REMOTE_TAG_SHA" ]; then
            git fetch --force origin "refs/tags/$TAG:refs/tags/$TAG"
            TAG_SHA=$(git rev-list -n 1 "refs/tags/$TAG")
            if [ "$TAG_SHA" != "$GITHUB_SHA" ]; then
              echo "Error: existing tag $TAG points to $TAG_SHA, expected $GITHUB_SHA"
              exit 1
            fi
          else
            git tag "$TAG" "$GITHUB_SHA"
            git push origin "$TAG"
            echo "Created tag $TAG at $GITHUB_SHA"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Release ${{ steps.version.outputs.tag }}
          body_path: release_notes.md
          draft: false
          prerelease: false

      # The `release: [published]` event does NOT trigger other workflows when
      # the release is created with GITHUB_TOKEN. Dispatch publish explicitly.
      - name: Trigger publish workflow
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run publish.yml --ref "${{ steps.version.outputs.tag }}"
