name: Publish

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  # Publish mira-eval (the core library) first — the others depend on it.
  publish-mira-eval:
    name: Publish base crates
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Verify publish source is on main
        run: |
          git fetch --no-tags origin main:refs/remotes/origin/main
          SOURCE_SHA=$(git rev-parse HEAD)
          if ! git merge-base --is-ancestor "$SOURCE_SHA" origin/main; then
            echo "Error: publish source $SOURCE_SHA is not reachable from origin/main"
            exit 1
          fi
          echo "Publish source verified on origin/main: $SOURCE_SHA"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Verify version matches tag
        env:
          EVENT_NAME: ${{ github.event_name }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          CARGO_VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          if [ "$EVENT_NAME" = "release" ]; then
            TAG_VERSION="${RELEASE_TAG#v}"
          elif [[ "$GITHUB_REF" =~ ^refs/tags/v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          elif [ "$GITHUB_REF" = "refs/heads/main" ]; then
            # Manual re-dispatch from main (e.g. to finish a partially-published
            # release). Publish steps are idempotent, so this only fills gaps.
            TAG_VERSION="$CARGO_VERSION"
          else
            echo "Error: manual publish must run from main or a stable release tag"
            exit 1
          fi
          if [ "$TAG_VERSION" != "$CARGO_VERSION" ]; then
            echo "Error: tag ($TAG_VERSION) != Cargo.toml ($CARGO_VERSION)"
            exit 1
          fi
          echo "Version verified: $TAG_VERSION"

      # mira-eval re-exports mira-macros, so the macro crate must be on crates.io
      # first. Wait for the index to update before publishing the dependent.
      - name: Publish mira-macros to crates.io
        run: scripts/cargo_publish_if_needed.sh mira-macros
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for crates.io index update
        run: sleep 30

      - name: Publish mira-eval to crates.io
        run: scripts/cargo_publish_if_needed.sh mira-eval
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  # Publish the crates that depend on mira-eval. mira-everruns, mira-judge, and
  # mira-publish-everruns depend only on mira-eval; mira-cli additionally depends
  # on mira-publish-everruns, so it publishes last, after a wait for the index.
  publish-dependents:
    name: Publish dependents
    runs-on: ubuntu-latest
    needs: publish-mira-eval
    environment: release
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Wait for crates.io index update
        run: sleep 30

      - name: Publish mira-everruns to crates.io
        run: scripts/cargo_publish_if_needed.sh mira-everruns
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish mira-judge to crates.io
        run: scripts/cargo_publish_if_needed.sh mira-judge
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish mira-publish-everruns to crates.io
        run: scripts/cargo_publish_if_needed.sh mira-publish-everruns
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      # mira-cli depends on mira-publish-everruns; wait for its index entry so
      # cargo's verify build can resolve it from crates.io.
      - name: Wait for crates.io index update
        run: sleep 30

      - name: Publish mira-cli to crates.io
        run: scripts/cargo_publish_if_needed.sh mira-cli
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  verify-publish:
    name: Verify published versions
    runs-on: ubuntu-latest
    needs: [publish-mira-eval, publish-dependents]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Verify crates.io versions
        run: |
          EXPECTED=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "Expected version: $EXPECTED"
          python3 scripts/verify_crates_publish.py --expected "$EXPECTED" \
            mira-macros mira-eval mira-cli mira-everruns mira-judge \
            mira-publish-everruns

  # Publish the Python SDK (PyPI package `mira-eval`) via OIDC Trusted Publishing
  # — no token. The publisher must be registered on PyPI once: project
  # `mira-eval`, owner `everruns`, repo `mira`, workflow `publish.yml`,
  # environment `release`. Independent of the crates above (the SDK is native, not
  # a binding), so a crates hiccup never blocks it.
  publish-python:
    name: Publish Python SDK
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
      id-token: write # OIDC token for Trusted Publishing
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Verify SDK version matches the workspace
        run: |
          CARGO_VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          SDK_VERSION=$(grep '^version' sdks/python/pyproject.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          if [ "$CARGO_VERSION" != "$SDK_VERSION" ]; then
            echo "Error: SDK version ($SDK_VERSION) != workspace ($CARGO_VERSION)"
            exit 1
          fi
          echo "SDK version verified: $SDK_VERSION"

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.x"

      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build sdks/python

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          packages-dir: sdks/python/dist/
          # Idempotent: a re-dispatch to finish a partial release won't fail on
          # the version already being on PyPI.
          skip-existing: true

  # Publish the TypeScript SDK (npm package `mira-eval`) via OIDC trusted
  # publishing — no token. The publisher must be registered on npmjs.com once:
  # package `mira-eval`, owner `everruns`, repo `mira`, workflow `publish.yml`,
  # environment `release`. Independent of the crates and the Python SDK.
  publish-typescript:
    name: Publish TypeScript SDK
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
      id-token: write # OIDC token for trusted publishing + provenance
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Verify SDK version matches the workspace
        run: |
          CARGO_VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          SDK_VERSION=$(node -p "require('./sdks/typescript/package.json').version")
          if [ "$CARGO_VERSION" != "$SDK_VERSION" ]; then
            echo "Error: SDK version ($SDK_VERSION) != workspace ($CARGO_VERSION)"
            exit 1
          fi
          echo "SDK version verified: $SDK_VERSION"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      # Trusted publishing (OIDC, no token) needs a recent npm; the runner ships
      # an older one. Upgrading also pulls in provenance support.
      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@latest

      - name: Build the SDK
        run: cd sdks/typescript && npm ci && npm run build

      - name: Publish to npm
        run: |
          cd sdks/typescript
          VERSION=$(node -p "require('./package.json').version")
          # Idempotent: a re-dispatch to finish a partial release no-ops on an
          # already-published version (the npm dual of PyPI skip-existing).
          if npm view "mira-eval@$VERSION" version >/dev/null 2>&1; then
            echo "mira-eval@$VERSION already on npm; skipping"
            exit 0
          fi
          npm publish --provenance --access public
