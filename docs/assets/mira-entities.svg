<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 500" font-family="-apple-system, Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#64748b"/>
    </marker>
  </defs>

  <!-- study (top of the hierarchy) -->
  <rect x="300" y="24" width="160" height="54" rx="10" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="380" y="50" text-anchor="middle" font-size="18" font-weight="700" fill="#14532d">study</text>
  <text x="380" y="68" text-anchor="middle" font-size="11" fill="#475569">holds one or more evals</text>

  <!-- study -> eval -->
  <line x1="380" y1="78" x2="380" y2="106" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- eval container -->
  <rect x="60" y="108" width="640" height="218" rx="12" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="82" y="134" font-size="16" font-weight="700" fill="#14532d">Eval</text>
  <text x="412" y="134" text-anchor="middle" font-size="12" fill="#475569">Dataset(Sample…) + Subject + [Scorer…]  ×  Targets × Axes</text>

  <!-- eval children -->
  <!-- dataset -->
  <rect x="78" y="152" width="110" height="156" rx="8" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="133" y="176" text-anchor="middle" font-size="13" font-weight="700" fill="#334155">Dataset</text>
  <text x="133" y="196" text-anchor="middle" font-size="10" fill="#64748b">Sample · Sample · …</text>
  <text x="133" y="222" text-anchor="middle" font-size="10" fill="#64748b">input turns</text>
  <text x="133" y="238" text-anchor="middle" font-size="10" fill="#64748b">expected</text>
  <text x="133" y="254" text-anchor="middle" font-size="10" fill="#64748b">files · tags</text>
  <text x="133" y="270" text-anchor="middle" font-size="10" fill="#64748b">metadata</text>

  <!-- subject -->
  <rect x="202" y="152" width="110" height="156" rx="8" fill="#fef3f2" stroke="#f97316" stroke-width="1.5"/>
  <text x="257" y="176" text-anchor="middle" font-size="13" font-weight="700" fill="#7c2d12">Subject</text>
  <text x="257" y="196" text-anchor="middle" font-size="10" fill="#64748b">under evaluation</text>
  <text x="257" y="222" text-anchor="middle" font-size="10" fill="#64748b">subject_fn</text>
  <text x="257" y="238" text-anchor="middle" font-size="10" fill="#64748b">CliSubject</text>
  <text x="257" y="254" text-anchor="middle" font-size="10" fill="#64748b">RuntimeSubject</text>
  <text x="257" y="270" text-anchor="middle" font-size="10" fill="#64748b">⇒ Transcript</text>

  <!-- scorer -->
  <rect x="326" y="152" width="110" height="156" rx="8" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="381" y="176" text-anchor="middle" font-size="13" font-weight="700" fill="#334155">Scorer…</text>
  <text x="381" y="196" text-anchor="middle" font-size="10" fill="#64748b">value 0..1 · pass</text>
  <text x="381" y="222" text-anchor="middle" font-size="10" fill="#64748b">built-ins</text>
  <text x="381" y="238" text-anchor="middle" font-size="10" fill="#64748b">budgets</text>
  <text x="381" y="254" text-anchor="middle" font-size="10" fill="#64748b">closures</text>
  <text x="381" y="270" text-anchor="middle" font-size="10" fill="#64748b">LLM judge</text>

  <!-- target -->
  <rect x="450" y="152" width="110" height="156" rx="8" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="505" y="176" text-anchor="middle" font-size="13" font-weight="700" fill="#334155">Target…</text>
  <text x="505" y="196" text-anchor="middle" font-size="10" fill="#64748b">the matrix axis</text>
  <text x="505" y="222" text-anchor="middle" font-size="10" fill="#64748b">label</text>
  <text x="505" y="238" text-anchor="middle" font-size="10" fill="#64748b">provider · model</text>
  <text x="505" y="254" text-anchor="middle" font-size="10" fill="#64748b">available</text>
  <text x="505" y="270" text-anchor="middle" font-size="10" fill="#64748b">model or harness</text>

  <!-- axis -->
  <rect x="574" y="152" width="110" height="156" rx="8" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="629" y="176" text-anchor="middle" font-size="13" font-weight="700" fill="#334155">Axis…</text>
  <text x="629" y="196" text-anchor="middle" font-size="10" fill="#64748b">extra dimensions</text>
  <text x="629" y="222" text-anchor="middle" font-size="10" fill="#64748b">effort</text>
  <text x="629" y="238" text-anchor="middle" font-size="10" fill="#64748b">retrieval</text>
  <text x="629" y="254" text-anchor="middle" font-size="10" fill="#64748b">harness variant</text>
  <text x="629" y="270" text-anchor="middle" font-size="10" fill="#64748b">crosses targets</text>

  <!-- eval -> expansion -->
  <line x1="380" y1="326" x2="380" y2="356" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="396" y="346" font-size="11" fill="#475569">host expands  evals × targets × axes × samples</text>

  <!-- expansion chips: case -> trial -> transcript -> score -->
  <rect x="70" y="362" width="120" height="50" rx="8" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="130" y="386" text-anchor="middle" font-size="13" font-weight="700" fill="#334155">Case</text>
  <text x="130" y="402" text-anchor="middle" font-size="10" fill="#64748b">eval/sample@target</text>

  <line x1="190" y1="387" x2="228" y2="387" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="230" y="362" width="120" height="50" rx="8" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="290" y="386" text-anchor="middle" font-size="13" font-weight="700" fill="#334155">Trial ×n</text>
  <text x="290" y="402" text-anchor="middle" font-size="10" fill="#64748b">repeats · seed</text>

  <line x1="350" y1="387" x2="388" y2="387" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="390" y="362" width="120" height="50" rx="8" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="450" y="386" text-anchor="middle" font-size="13" font-weight="700" fill="#334155">Transcript</text>
  <text x="450" y="402" text-anchor="middle" font-size="10" fill="#64748b">response · usage</text>

  <line x1="510" y1="387" x2="548" y2="387" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="550" y="362" width="120" height="50" rx="8" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="610" y="386" text-anchor="middle" font-size="13" font-weight="700" fill="#334155">Score</text>
  <text x="610" y="402" text-anchor="middle" font-size="10" fill="#64748b">pass · fail · N/A</text>

  <!-- caption -->
  <text x="380" y="446" text-anchor="middle" font-size="11" fill="#94a3b8">A study holds evals; an eval composes a dataset, a subject, scorers, and the matrix axes (targets × axes).</text>
  <text x="380" y="464" text-anchor="middle" font-size="11" fill="#94a3b8">The host expands that matrix into cases — repeated as trials — and each run yields a transcript scored into scores.</text>
</svg>
