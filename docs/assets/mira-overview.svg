<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 240" font-family="-apple-system, Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#64748b"/>
    </marker>
  </defs>

  <!-- host -->
  <rect x="24" y="80" width="150" height="80" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  <text x="99" y="112" text-anchor="middle" font-size="18" font-weight="700" fill="#1e3a8a">host</text>
  <text x="99" y="134" text-anchor="middle" font-size="12" fill="#475569">mira CLI</text>
  <text x="99" y="150" text-anchor="middle" font-size="11" fill="#64748b">matrix · report</text>

  <!-- study -->
  <rect x="245" y="80" width="150" height="80" rx="10" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="320" y="112" text-anchor="middle" font-size="18" font-weight="700" fill="#14532d">study</text>
  <text x="320" y="134" text-anchor="middle" font-size="12" fill="#475569">your eval program</text>
  <text x="320" y="150" text-anchor="middle" font-size="11" fill="#64748b">subjects · scorers</text>

  <!-- subject -->
  <rect x="466" y="80" width="150" height="80" rx="10" fill="#fef3f2" stroke="#f97316" stroke-width="2"/>
  <text x="541" y="112" text-anchor="middle" font-size="18" font-weight="700" fill="#7c2d12">subject</text>
  <text x="541" y="134" text-anchor="middle" font-size="12" fill="#475569">under evaluation</text>
  <text x="541" y="150" text-anchor="middle" font-size="11" fill="#64748b">runs a model</text>

  <!-- host -> study -->
  <line x1="174" y1="120" x2="245" y2="120" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="209" y="110" text-anchor="middle" font-size="11" fill="#475569">protocol</text>
  <text x="209" y="74" text-anchor="middle" font-size="10" fill="#94a3b8">stdio JSON</text>

  <!-- study -> subject -->
  <line x1="395" y1="120" x2="466" y2="120" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="430" y="110" text-anchor="middle" font-size="11" fill="#475569">drives</text>

  <text x="320" y="210" text-anchor="middle" font-size="12" fill="#94a3b8">The host owns the run; the study owns subjects and scorers; a subject evaluates a model.</text>
</svg>
