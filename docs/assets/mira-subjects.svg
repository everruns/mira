<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 740 380" font-family="-apple-system, Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#64748b"/>
    </marker>
  </defs>

  <!-- sample -->
  <rect x="24" y="158" width="120" height="64" rx="10" fill="#f8fafc" stroke="#94a3b8" stroke-width="2"/>
  <text x="84" y="186" text-anchor="middle" font-size="15" font-weight="700" fill="#334155">Sample</text>
  <text x="84" y="206" text-anchor="middle" font-size="10" fill="#64748b">input · files · tags</text>

  <text x="197" y="184" text-anchor="middle" font-size="10" fill="#94a3b8">pick one</text>
  <text x="197" y="197" text-anchor="middle" font-size="10" fill="#94a3b8">shape</text>

  <!-- subject shapes -->
  <rect x="250" y="28" width="190" height="78" rx="10" fill="#fef3f2" stroke="#f97316" stroke-width="2"/>
  <text x="345" y="54" text-anchor="middle" font-size="14" font-weight="700" fill="#7c2d12">subject_fn</text>
  <text x="345" y="74" text-anchor="middle" font-size="10" fill="#64748b">in-process closure</text>
  <text x="345" y="90" text-anchor="middle" font-size="10" fill="#64748b">evals next to your code</text>

  <rect x="250" y="150" width="190" height="78" rx="10" fill="#fef3f2" stroke="#f97316" stroke-width="2"/>
  <text x="345" y="176" text-anchor="middle" font-size="14" font-weight="700" fill="#7c2d12">CliSubject</text>
  <text x="345" y="196" text-anchor="middle" font-size="10" fill="#64748b">external binary · polyglot</text>
  <text x="345" y="212" text-anchor="middle" font-size="10" fill="#64748b">stdout or JSONL events</text>

  <rect x="250" y="272" width="190" height="78" rx="10" fill="#fef3f2" stroke="#f97316" stroke-width="2"/>
  <text x="345" y="298" text-anchor="middle" font-size="14" font-weight="700" fill="#7c2d12">RuntimeSubject</text>
  <text x="345" y="318" text-anchor="middle" font-size="10" fill="#64748b">mira-everruns session</text>
  <text x="345" y="334" text-anchor="middle" font-size="10" fill="#64748b">live everruns-runtime</text>

  <!-- sample -> subjects -->
  <line x1="144" y1="184" x2="248" y2="74" stroke="#64748b" stroke-width="1.8" marker-end="url(#arrow)"/>
  <line x1="144" y1="190" x2="248" y2="189" stroke="#64748b" stroke-width="1.8" marker-end="url(#arrow)"/>
  <line x1="144" y1="196" x2="248" y2="304" stroke="#64748b" stroke-width="1.8" marker-end="url(#arrow)"/>

  <!-- subjects -> transcript (fan-in) -->
  <line x1="440" y1="67" x2="556" y2="178" stroke="#64748b" stroke-width="1.8" marker-end="url(#arrow)"/>
  <line x1="440" y1="189" x2="556" y2="200" stroke="#64748b" stroke-width="1.8" marker-end="url(#arrow)"/>
  <line x1="440" y1="311" x2="556" y2="222" stroke="#64748b" stroke-width="1.8" marker-end="url(#arrow)"/>
  <text x="500" y="150" text-anchor="middle" font-size="10" fill="#94a3b8">normalize</text>

  <!-- transcript -->
  <rect x="558" y="140" width="158" height="120" rx="10" fill="#f8fafc" stroke="#94a3b8" stroke-width="2"/>
  <text x="637" y="164" text-anchor="middle" font-size="15" font-weight="700" fill="#334155">Transcript</text>
  <text x="637" y="184" text-anchor="middle" font-size="10" fill="#64748b">final_response</text>
  <text x="637" y="200" text-anchor="middle" font-size="10" fill="#64748b">usage · timing</text>
  <text x="637" y="216" text-anchor="middle" font-size="10" fill="#64748b">tool_calls · files</text>
  <text x="637" y="232" text-anchor="middle" font-size="10" fill="#64748b">events · metrics</text>
  <text x="637" y="248" text-anchor="middle" font-size="10" fill="#64748b">error_kind</text>

  <!-- transcript -> scorers/reporting -->
  <line x1="637" y1="260" x2="637" y2="292" stroke="#64748b" stroke-width="1.8" marker-end="url(#arrow)"/>
  <rect x="558" y="294" width="158" height="40" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5"/>
  <text x="637" y="318" text-anchor="middle" font-size="11" font-weight="600" fill="#14532d">scorers · reporting (shared)</text>

  <!-- caption -->
  <text x="370" y="370" text-anchor="middle" font-size="11" fill="#94a3b8">Whatever the shape, every subject normalizes a sample into the same Transcript — so scoring and reporting are shared.</text>
</svg>
