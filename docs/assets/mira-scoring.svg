<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 390" font-family="-apple-system, Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#64748b"/>
    </marker>
  </defs>

  <!-- sample -->
  <rect x="20" y="92" width="120" height="56" rx="10" fill="#f8fafc" stroke="#94a3b8" stroke-width="2"/>
  <text x="80" y="118" text-anchor="middle" font-size="14" font-weight="700" fill="#334155">Sample</text>
  <text x="80" y="136" text-anchor="middle" font-size="10" fill="#64748b">expected · input</text>

  <!-- transcript -->
  <rect x="20" y="208" width="120" height="68" rx="10" fill="#f8fafc" stroke="#94a3b8" stroke-width="2"/>
  <text x="80" y="234" text-anchor="middle" font-size="14" font-weight="700" fill="#334155">Transcript</text>
  <text x="80" y="252" text-anchor="middle" font-size="10" fill="#64748b">result · tools</text>
  <text x="80" y="266" text-anchor="middle" font-size="10" fill="#64748b">metrics · files</text>

  <!-- three surfaces -->
  <rect x="192" y="60" width="170" height="52" rx="8" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="277" y="82" text-anchor="middle" font-size="12" font-weight="700" fill="#334155">result</text>
  <text x="277" y="99" text-anchor="middle" font-size="10" fill="#64748b">final_response</text>

  <rect x="192" y="146" width="170" height="52" rx="8" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="277" y="168" text-anchor="middle" font-size="12" font-weight="700" fill="#334155">transcript</text>
  <text x="277" y="185" text-anchor="middle" font-size="10" fill="#64748b">tool_calls · files · events</text>

  <rect x="192" y="232" width="170" height="52" rx="8" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="277" y="254" text-anchor="middle" font-size="12" font-weight="700" fill="#334155">metrics</text>
  <text x="277" y="271" text-anchor="middle" font-size="10" fill="#64748b">usage · timing</text>

  <text x="166" y="300" text-anchor="middle" font-size="10" fill="#94a3b8">three surfaces</text>

  <!-- transcript -> surfaces -->
  <line x1="140" y1="238" x2="190" y2="100" stroke="#64748b" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line x1="140" y1="240" x2="190" y2="172" stroke="#64748b" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line x1="140" y1="244" x2="190" y2="252" stroke="#64748b" stroke-width="1.6" marker-end="url(#arrow)"/>

  <!-- scorers box (study-side) -->
  <rect x="410" y="56" width="190" height="270" rx="12" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="430" y="82" font-size="15" font-weight="700" fill="#14532d">Scorers</text>
  <text x="505" y="106" text-anchor="middle" font-size="11" font-weight="600" fill="#334155">Built-ins</text>
  <text x="505" y="121" text-anchor="middle" font-size="10" fill="#64748b">text · tools · files</text>
  <text x="505" y="146" text-anchor="middle" font-size="11" font-weight="600" fill="#334155">Budgets</text>
  <text x="505" y="161" text-anchor="middle" font-size="10" fill="#64748b">tokens · cost · latency</text>
  <text x="505" y="186" text-anchor="middle" font-size="11" font-weight="600" fill="#334155">Closures</text>
  <text x="505" y="201" text-anchor="middle" font-size="10" fill="#64748b">scorer(name, fn)</text>
  <text x="505" y="226" text-anchor="middle" font-size="11" font-weight="600" fill="#334155">LLM-judge</text>
  <text x="505" y="241" text-anchor="middle" font-size="10" fill="#64748b">model_graded · LlmJudge</text>
  <line x1="430" y1="258" x2="580" y2="258" stroke="#bbf7d0" stroke-width="1.5"/>
  <text x="505" y="278" text-anchor="middle" font-size="11" font-weight="600" fill="#334155">Combinators</text>
  <text x="505" y="293" text-anchor="middle" font-size="10" fill="#64748b">all_of · any_of · not</text>
  <text x="505" y="312" text-anchor="middle" font-size="9.5" fill="#94a3b8">(compose other scorers)</text>

  <!-- surfaces -> scorers -->
  <line x1="362" y1="86" x2="408" y2="120" stroke="#64748b" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line x1="362" y1="172" x2="408" y2="172" stroke="#64748b" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line x1="362" y1="258" x2="408" y2="224" stroke="#64748b" stroke-width="1.6" marker-end="url(#arrow)"/>

  <!-- sample -> scorers (expected) -->
  <path d="M140 112 C 250 40, 360 30, 410 70" fill="none" stroke="#64748b" stroke-width="1.4" stroke-dasharray="5 3" marker-end="url(#arrow)"/>
  <text x="300" y="34" text-anchor="middle" font-size="10" fill="#475569">expected answer</text>

  <!-- scorers -> score -->
  <line x1="600" y1="140" x2="642" y2="140" stroke="#64748b" stroke-width="1.8" marker-end="url(#arrow)"/>

  <!-- score -->
  <rect x="644" y="100" width="128" height="80" rx="10" fill="#f8fafc" stroke="#94a3b8" stroke-width="2"/>
  <text x="708" y="124" text-anchor="middle" font-size="14" font-weight="700" fill="#334155">Score</text>
  <text x="708" y="143" text-anchor="middle" font-size="10" fill="#64748b">value 0..1 + pass</text>
  <text x="708" y="160" text-anchor="middle" font-size="10" fill="#64748b">or N/A</text>
  <text x="708" y="174" text-anchor="middle" font-size="10" fill="#64748b">(excluded)</text>

  <!-- score -> verdict -->
  <line x1="708" y1="180" x2="708" y2="214" stroke="#64748b" stroke-width="1.8" marker-end="url(#arrow)"/>

  <!-- verdict -->
  <rect x="644" y="216" width="128" height="92" rx="10" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  <text x="708" y="240" text-anchor="middle" font-size="13" font-weight="700" fill="#1e3a8a">Case verdict</text>
  <text x="708" y="259" text-anchor="middle" font-size="10" fill="#64748b">passes iff every</text>
  <text x="708" y="273" text-anchor="middle" font-size="10" fill="#64748b">applicable score passes</text>
  <text x="708" y="293" text-anchor="middle" font-size="10" fill="#64748b">all N/A ⇒ not evaluated</text>

  <!-- caption -->
  <text x="390" y="372" text-anchor="middle" font-size="11" fill="#94a3b8">Each scorer reads the sample and one surface of the transcript and returns a Score — or N/A when it can't run.</text>
</svg>
